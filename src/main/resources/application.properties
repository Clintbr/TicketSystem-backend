# 1. Die URL (Nur Protokoll, Host, Port und Datenbank)
# Wir f³gen ?sslmode=require hinzu, da Supabase das in der Cloud erzwingt.
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:${DB_PORT}/${DB_NAME}?sslmode=require

# 2. Die Zugangsdaten (Spring injiziert diese automatisch in die Verbindung)
# WICHTIG: Der DB_USER bei Supabase Poolern ist oft "postgres.PROJEKT_ID"
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# 3. Supabase Spezifische Einstellungen
supabase.url=https://${SUPABASE_PROJEKT_ID}.supabase.co
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://${SUPABASE_PROJEKT_ID}.supabase.co/auth/v1/.well-known/jwks.json
supabase.anon.key=${SUPABASE_JWT_SECRET}

# 4. Treiber und Optimierung
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=10

# 5. JPA/Hibernate (Diese sollten aktiv bleiben!)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect